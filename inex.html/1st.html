<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GuideSphere</title>

<style>
body{font-family:'Segoe UI';margin:0;background:#eef2f7}

/* LOGIN */
.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#e3f2fd,#ffffff);
}

.card{
background:white;
padding:25px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#007bff;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}

.hidden{display:none}

/* NAV */
.nav{
background:#007bff;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.nav button{
background:white;
color:#007bff;
margin-left:8px;
}

/* HOME */
.section{padding:20px}

.home-header{text-align:center}
.home-logo{width:250px;margin:auto}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.place{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.place img{
width:100%;
height:110px;
object-fit:cover;
}

.place p{text-align:center;font-size:13px}

/* BOX */
.box{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.guide{
background:#f5f5f5;
padding:10px;
margin:8px 0;
border-radius:8px;
}

.logo-img{width:120px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<div class="card">
<img src="logo.png.jpeg" class="logo-img">
<h2>GuideSphere</h2>
<input id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<p><a href="#" onclick="showSignup()">Sign Up</a></p>
</div>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="container hidden">
<div class="card">
<h2>Create Account</h2>
<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<button onclick="signup()">Create</button>
<p><a href="#" onclick="showLogin()">Back</a></p>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="nav">
<span><b>GuideSphere</b></span>
<div>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('guides')">Guides</button>
<button onclick="showSection('hotels')">Hotels</button>
<button onclick="showSection('transport')">Transport</button>
<button onclick="showSection('feedback')">Feedback</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="section">
<div class="home-header">
<img src="logo.png.jpeg" class="home-logo">
</div>

<h3>Explore Destinations</h3>

<select id="category">
<option value="">Select Category</option>
<option value="beach">Beach</option>
<option value="hill">Hill</option>
<option value="temple">Temple</option>
</select>

<button onclick="showPlaces()">Explore</button>

<div id="places" class="grid"></div>
<div id="details" class="box hidden"></div>
</div>

<!-- GUIDES -->
<div id="guides" class="section hidden">
<h3>Find Guides</h3>
<input id="guidePlace" placeholder="Enter place">
<button onclick="searchGuides()">Search</button>
<div id="guideResults" class="box"></div>
</div>

<!-- HOTELS -->
<div id="hotels" class="section hidden">
<h3>Hotels</h3>
<input id="hotelPlace" placeholder="Enter place">
<button onclick="searchHotels()">Search</button>
<div id="hotelResults" class="box"></div>
</div>

<!-- TRANSPORT -->
<div id="transport" class="section hidden">
<h3>Transport</h3>

<input id="from" placeholder="From">
<input id="to" placeholder="To">

<button onclick="searchTransport()">Search</button>

<div id="transportResult" class="box"></div>
</div>

<!-- FEEDBACK -->
<div id="feedback" class="section hidden">
<h3>Feedback</h3>
<select id="rating">
<option>5⭐ Excellent</option>
<option>4⭐ Good</option>
<option>3⭐ Average</option>
</select>
<textarea id="comment" placeholder="Write feedback"></textarea>
<button onclick="submitFeedback()">Submit</button>
<div id="feedbackMsg"></div>
</div>

</div>

<script>

// NAV
function showSection(s){
document.querySelectorAll('.section').forEach(e=>e.classList.add('hidden'));
document.getElementById(s).classList.remove('hidden');
}

// LOGIN
function login(){
if(user.value){loginPage.classList.add('hidden');app.classList.remove('hidden');}
}

function signup(){alert("Account created");showLogin();}
function showSignup(){loginPage.classList.add('hidden');signupPage.classList.remove('hidden');}
function showLogin(){signupPage.classList.add('hidden');loginPage.classList.remove('hidden');}
function logout(){location.reload();}

// PLACES
const placesData={
  beach:[
    {name:'Goa', img:'https://images.unsplash.com/photo-1580932205336-12d3c4d7c9f3?auto=format&fit=crop&w=500&q=60'},
    {name:'Maldives', img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=60'},
    {name:'Bali', img:'https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=500&q=60'},
    {name:'Andaman', img:'https://images.unsplash.com/photo-1549887534-41732c7f0f6c?auto=format&fit=crop&w=500&q=60'}
  ],
  hill:[
    {name:'Manali', img:'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=500&q=60'},
    {name:'Ooty', img:'https://images.unsplash.com/photo-1514516877000-3a7d6b0a61b3?auto=format&fit=crop&w=500&q=60'},
    {name:'Shimla', img:'https://images.unsplash.com/photo-1519638399535-1b036603ac77?auto=format&fit=crop&w=500&q=60'},
    {name:'Munnar', img:'https://images.unsplash.com/photo-1526481280690-04f8ecb03e21?auto=format&fit=crop&w=500&q=60'}
  ],
  temple:[
    {name:'Tirupati', img:'https://images.unsplash.com/photo-1608186961501-25a3b584214d?auto=format&fit=crop&w=500&q=60'},
    {name:'Varanasi', img:'https://images.unsplash.com/photo-1584041161513-1a16d3e92e9f?auto=format&fit=crop&w=500&q=60'},
    {name:'Rameshwaram', img:'https://images.unsplash.com/photo-1598297991045-b32a3e87d1b7?auto=format&fit=crop&w=500&q=60'},
    {name:'Madurai', img:'https://images.unsplash.com/photo-1599405365476-2d6dbb4ceba6?auto=format&fit=crop&w=500&q=60'}
  ]
};

const detailsData={
Goa:{guides:[{name:'Ankit',rating:'4.8⭐',price:'₹1200'}],hotels:['Beach Resort'],nearby:['Baga Beach']},
Maldives:{guides:[{name:'Ali',rating:'4.9⭐',price:'₹5000'}],hotels:['Ocean View'],nearby:['Sun Island']},
Bali:{guides:[{name:'Dewa',rating:'4.7⭐',price:'₹1800'}],hotels:['Bali Inn'],nearby:['Kuta Beach']},
Andaman:{guides:[{name:'Rohan',rating:'4.8⭐',price:'₹2000'}],hotels:['Sea Breeze'],nearby:['Radhanagar Beach']},
Manali:{guides:[{name:'Karan',rating:'4.7⭐',price:'₹1100'}],hotels:['Snow Hotel'],nearby:['Solang Valley']},
Ooty:{guides:[{name:'Sahana',rating:'4.8⭐',price:'₹1200'}],hotels:['Hilltop Inn'],nearby:['Botanical Garden']},
Shimla:{guides:[{name:'Raj',rating:'4.6⭐',price:'₹1000'}],hotels:['Mountain View'],nearby:['Mall Road']},
Munnar:{guides:[{name:'Anu',rating:'4.9⭐',price:'₹1300'}],hotels:['Tea Estate'],nearby:['Eravikulam NP']},
Tirupati:{guides:[{name:'Ravi',rating:'4.9⭐',price:'₹900'}],hotels:['Temple View'],nearby:['Fort']},
Varanasi:{guides:[{name:'Vikram',rating:'4.7⭐',price:'₹800'}],hotels:['Ganga View'],nearby:['Dashashwamedh Ghat']},
Rameshwaram:{guides:[{name:'Arun',rating:'4.8⭐',price:'₹950'}],hotels:['Sea Temple'],nearby:['Agni Theertham']},
Madurai:{guides:[{name:'Suresh',rating:'4.6⭐',price:'₹1000'}],hotels:['Meenakshi Hotel'],nearby:['Meenakshi Temple']}
};

function showPlaces(){
let type=category.value;
places.innerHTML='';
details.classList.add('hidden');

if(!placesData[type]) return;

placesData[type].forEach(p=>{
places.innerHTML+=`
<div class="place" onclick="showDetails('${p.name}')">
<img src="${p.img}">
<p>${p.name}</p>
</div>`;
});
}

function showDetails(name){
let d=detailsData[name];
if(!d){details.innerHTML="Details coming soon";details.classList.remove('hidden');return;}

details.classList.remove('hidden');
details.innerHTML=`
<h3>${name}</h3>

<b>Guides:</b>
${d.guides.map(g=>`
<div class="guide">${g.name} ⭐ ${g.rating} ₹${g.price}
<button onclick="bookGuide('${g.name}')">Book</button></div>`).join('')}

<br><b>Hotels:</b><br>${d.hotels.join('<br>')}
<br><br><b>Nearby:</b><br>${d.nearby.join(', ')}
`;
}

function bookGuide(name){alert("Guide booked: "+name);}

// GUIDES SEARCH
function searchGuides(){
let p=guidePlace.value.toLowerCase();
guideResults.innerHTML="Use Home page click";
}

// HOTELS
const hotelData={
goa:[
{name:'Luxury Resort',rating:'5⭐',price:'₹8000'},
{name:'Budget Stay',rating:'3⭐',price:'₹1500'}
]
};

function searchHotels(){
let p=hotelPlace.value.toLowerCase();
if(!hotelData[p]){hotelResults.innerHTML="Enter Goa";return;}
hotelResults.innerHTML=hotelData[p].map(h=>`
<div class="guide">${h.name} ⭐${h.rating} ₹${h.price}
<button onclick="bookHotel('${h.name}')">Book</button></div>
`).join('');
}

function bookHotel(n){alert("Hotel booked: "+n);}

// TRANSPORT
function searchTransport(){
let f=from.value,t=to.value;
if(!f||!t){alert("Enter both");return;}

transportResult.innerHTML=`
<b>${f} → ${t}</b><br><br>

Taxi ₹2000 (5 hrs)
<button onclick="bookTransport('Taxi')">Book</button><br><br>

Bus ₹800 (8 hrs)
<button onclick="bookTransport('Bus')">Book</button><br><br>

Train ₹600 (10 hrs)
<button onclick="bookTransport('Train')">Book</button><br><br>

Flight ₹5000 (1.5 hrs)
<button onclick="bookTransport('Flight')">Book</button>
`;
}

function bookTransport(t){alert(t+" booked");}

// FEEDBACK
function submitFeedback(){
feedbackMsg.innerHTML="Thank you!";
}

</script>

</body>
</html>
